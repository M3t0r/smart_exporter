name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build-and-test:
    name: Build and test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        rust:
          - stable

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust ${{ matrix.rust }}
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked --verbose

      - name: Build release artifact
        if: ${{ matrix.rust == 'stable' }}
        run: cargo build --release --locked --verbose

      - name: Upload build artifact
        if: ${{ matrix.rust == 'stable' }}
        uses: actions/upload-artifact@v4
        with:
          name: smart_exporter-${{ runner.os }}-${{ runner.arch }}
          path: target/release/smart_exporter

  lint-and-check:
    name: Lint and formatting
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Install Rust stable with components
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cargo check
        run: cargo check --locked --all-targets --verbose

      - name: Clippy
        run: cargo clippy --locked --all-targets --verbose -- -D warnings

      - name: Check formatting
        run: cargo fmt --all --check
